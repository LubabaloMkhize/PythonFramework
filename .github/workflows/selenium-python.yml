name: Selenium Python CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  selenium-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest --browser=edge --alluredir=allure-results

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4

        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: Allure-Report
          path: allure-report/

      - name: Upload PDF Summary
        uses: actions/upload-artifact@v4
        with:
          name: Test-Summary-PDF
          path: reports/TestExecutionReport.pdf